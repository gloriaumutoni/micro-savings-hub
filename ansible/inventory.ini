[bastion]
bastion-vm ansible_host={{ BASTION_PUBLIC_IP }}

[bastion:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/afrikasave-deploy
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

[app_server]
app-vm ansible_host={{ APP_VM_PRIVATE_IP }}

[app_server:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/afrikasave-deploy
# Route all SSH connections to the App VM through the Bastion Host.
# The App VM has no public IP, so it is only reachable via this jump.
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o ProxyCommand="ssh -W %h:%p -q -i ~/.ssh/afrikasave-deploy -o StrictHostKeyChecking=no ubuntu@{{ BASTION_PUBLIC_IP }}"'
