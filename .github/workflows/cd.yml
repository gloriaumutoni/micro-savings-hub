name: CD — Deploy to Production

on:
  push:
    branches:
      - main

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: micro_savings_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d micro_savings_hub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Apply database schema
        working-directory: backend
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d micro_savings_hub_test -f db/init.sql

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 1d
        run: npm test

      - name: Verify backend starts (smoke test)
        working-directory: backend
        env:
          PORT: 5001
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 1d
        run: |
          node app.js &
          sleep 3
          curl -f http://localhost:5001/health
          kill %1