# Continuous deployment: merge to main → CI checks → ECR images → Ansible on the App VM.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY — IAM user allowed to push to ECR (and sts:GetCallerIdentity).
#   BASTION_HOST — public IP or DNS of the bastion (SSH + Nginx entry).
#   APP_VM_HOST — private IP of the app EC2 (reachable via bastion jump).
#   SSH_PRIVATE_KEY — OpenSSH private key matching the EC2 key pair (PEM or OpenSSH format).
#   DATABASE_URL — production Postgres URL for docker-compose (RDS).
#   JWT_SECRET — backend signing secret.
# Optional: AWS_REGION (defaults to eu-west-1).

name: CD — Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: cd-production
  cancel-in-progress: true

jobs:
  ci:
    name: Run full CI (lint, test, tfsec, Trivy)
    uses: ./.github/workflows/ci.yml
    secrets: inherit
