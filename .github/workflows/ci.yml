name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: micro_savings_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d micro_savings_hub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run database migrations
        working-directory: backend
        env:
          PGPASSWORD: postgres
        run: psql -h localhost -U postgres -d micro_savings_hub_test -f db/init.sql

      - name: Run backend tests
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: test_secret
          JWT_EXPIRES_IN: 1d
        run: npm test

      - name: Verify backend starts
        working-directory: backend
        env:
          PORT: 5001
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: test_secret
          JWT_EXPIRES_IN: 1d
        run: |
          node app.js &
          sleep 3
          curl -f http://localhost:5001/health
          kill %1

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
