name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          # Not a secret — this is a throwaway container that exists only for the duration of the CI run and holds no real data. Destroyed after every run.
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: micro_savings_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d micro_savings_hub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run database migrations
        working-directory: backend
        env:
          PGPASSWORD: postgres # matches the throwaway CI container password above
        run: psql -h localhost -U postgres -d micro_savings_hub_test -f db/init.sql

      - name: Run backend tests
        working-directory: backend
        env:
          # 127.0.0.1 used instead of localhost — pg resolves localhost to ::1 (IPv6) first, which the container does not listen on. sslmode=disable — no SSL for local containers.
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 1d
        run: npm test

      - name: Verify backend starts
        working-directory: backend
        env:
          PORT: 5001
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 1d
        run: |
          node app.js &
          sleep 3
          curl -f http://localhost:5001/health
          kill %1

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  tfsec:
    name: IaC — tfsec (Terraform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec on terraform/
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false
          format: sarif
          sarif_file: tfsec.sarif

      - name: Upload tfsec SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: tfsec-sarif
          path: tfsec.sarif

  checkov:
    name: IaC — checkov (Terraform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run checkov on terraform/
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: true
          output_format: cli
          output_file_path: checkov-results.txt

      - name: Upload checkov results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: checkov-results
          path: checkov-results.txt

  docker:
    name: Docker — Build, Trivy scan, Push to GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend, tfsec, checkov]
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (local tag for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: micro-savings-hub-backend:ci
          no-cache: true

      - name: Trivy — scan backend image (table summary)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: micro-savings-hub-backend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Trivy — scan backend image (fail on HIGH or CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: micro-savings-hub-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-backend.sarif
          trivyignores: .trivyignore

      - name: Upload backend Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-backend-sarif
          path: trivy-backend.sarif

      - name: Build frontend image (local tag for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: micro-savings-hub-frontend:ci
          no-cache: true

      - name: Trivy — scan frontend image (table summary)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: micro-savings-hub-frontend:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: "0"
          trivyignores: .trivyignore

      - name: Trivy — scan frontend image (fail on HIGH or CRITICAL)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: micro-savings-hub-frontend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-frontend.sarif
          trivyignores: .trivyignore

      - name: Upload frontend Trivy SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-frontend-sarif
          path: trivy-frontend.sarif

      - name: Security scan summary
        if: always()
        run: |
          echo "============================================"
          echo "        DEVSECOPS SCAN SUMMARY"
          echo "============================================"
          echo "tfsec    — Terraform IaC scan complete"
          echo "checkov  — Terraform IaC scan complete"
          echo "Trivy    — Backend image scan complete"
          echo "Trivy    — Frontend image scan complete"
          echo "--------------------------------------------"
          echo "Severity threshold : HIGH, CRITICAL"
          echo "Unfixed CVEs       : ignored"
          echo "SARIF artifacts    : trivy-backend-sarif"
          echo "                     trivy-frontend-sarif"
          echo "                     tfsec-sarif"
          echo "                     checkov-results"
          echo "============================================"
