name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
jobs:
  backend:
    name: Backend — Lint & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          # Not a secret — this is a throwaway container that exists only for the duration of the CI run and holds no real data. Destroyed after every run.
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: micro_savings_hub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d micro_savings_hub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install PostgreSQL client (psql)
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Run database migrations
        working-directory: backend
        env:
          PGPASSWORD: postgres # matches the throwaway CI container password above
        run: psql -h localhost -U postgres -d micro_savings_hub_test -f db/init.sql

      - name: Run backend tests
        working-directory: backend
        env:
          # 127.0.0.1 used instead of localhost — pg resolves localhost to ::1 (IPv6) first, which the container does not listen on. sslmode=disable — no SSL for local containers.
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 1d
        run: npm test

      - name: Verify backend starts
        working-directory: backend
        env:
          PORT: 5001
          DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/micro_savings_hub_test?sslmode=disable
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: 1d
        run: |
          node app.js &
          sleep 3
          curl -f http://localhost:5001/health
          kill %1

  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  tfsec:
    name: IaC — tfsec (Terraform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run tfsec on terraform/
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform
          soft_fail: false

  checkov:
    name: IaC — checkov (Terraform)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run checkov on terraform/
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          soft_fail: false
          output_format: cli

  docker:
    name: Docker — Build, Trivy scan, Push to GHCR
    runs-on: ubuntu-latest
    needs: [backend, frontend, tfsec]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (local tag for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          load: true
          tags: micro-savings-hub-backend:ci

      - name: Trivy — scan backend image (fail on CRITICAL or HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: micro-savings-hub-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push backend image to GHCR
        run: |
          docker tag micro-savings-hub-backend:ci ghcr.io/${{ github.repository_owner }}/micro-savings-hub:${{ github.sha }}
          docker tag micro-savings-hub-backend:ci ghcr.io/${{ github.repository_owner }}/micro-savings-hub:latest
          docker push ghcr.io/${{ github.repository_owner }}/micro-savings-hub:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/micro-savings-hub:latest

      - name: Build frontend image (local tag for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          load: true
          tags: micro-savings-hub-frontend:ci

      - name: Trivy — scan frontend image (fail on CRITICAL or HIGH)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: micro-savings-hub-frontend:ci
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

      - name: Tag and push frontend image to GHCR
        run: |
          docker tag micro-savings-hub-frontend:ci ghcr.io/${{ github.repository_owner }}/micro-savings-hub-frontend:${{ github.sha }}
          docker tag micro-savings-hub-frontend:ci ghcr.io/${{ github.repository_owner }}/micro-savings-hub-frontend:latest
          docker push ghcr.io/${{ github.repository_owner }}/micro-savings-hub-frontend:${{ github.sha }}
          docker push ghcr.io/${{ github.repository_owner }}/micro-savings-hub-frontend:latest
